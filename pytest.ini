[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -q
markers =
    unit: fast, isolated unit tests (no API calls)
    integration: tests that wire multiple components together (still mocked)
    slow: tests that may take longer (e.g. real API calls – skipped by default)
